# Media Streaming deployment
{{- if .Values.mediaStreaming.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-streaming
  template:
    metadata:
      labels:
        app: media-streaming
        kids-label: "0"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: server
        image: nginx:alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Starting media streaming simulation..."
            # Create dummy media content
            mkdir -p /usr/share/nginx/html/media
            dd if=/dev/urandom of=/usr/share/nginx/html/media/video1.bin bs=1M count=5 2>/dev/null
            dd if=/dev/urandom of=/usr/share/nginx/html/media/video2.bin bs=1M count=3 2>/dev/null
            dd if=/dev/urandom of=/usr/share/nginx/html/media/audio1.bin bs=512K count=4 2>/dev/null
            nginx -g 'daemon off;'
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 150m
            memory: 128Mi
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
spec:
  ports:
  - port: 80
  selector:
    app: media-streaming
{{- end }}
