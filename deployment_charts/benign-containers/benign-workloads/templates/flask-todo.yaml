{{- if .Values.flaskTodo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-postgres
  template:
    metadata:
      labels:
        app: flask-postgres
        kids-label: "0"
    spec:
      containers:
      - name: postgres
        image: postgres:14
        env:
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "dbPassword"
        - name: POSTGRES_DB
          value: "todo"
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: flask-postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-todo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-todo
  template:
    metadata:
      labels:
        app: flask-todo
        kids-label: "0"
    spec:
      containers:
      - name: flask-todo
        image: danielcristh0/flask-todo:1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: "development"
        - name: DATABASE_URL
          value: "postgresql://admin:dbPassword@db:5432/todo"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-todo
spec:
  selector:
    app: flask-todo
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: ClusterIP
{{- end }}
