# Web Serving deployment
# Stacks -> MySQL, Nginx, Memcached
{{- if .Values.webServing.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-serving-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-serving-db
  template:
    metadata:
      labels:
        app: web-serving-db
        kids-label: "0"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: db
        image: mysql:5.7
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "webserving_pass"
        - name: MYSQL_DATABASE
          value: "webserving"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/mysql
      volumes:
      - name: db-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: web-serving-db
spec:
  ports:
  - port: 3306
  selector:
    app: web-serving-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-serving-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-serving-app
  template:
    metadata:
      labels:
        app: web-serving-app
        kids-label: "0"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: app
        image: nginx:alpine
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 150m
            memory: 128Mi
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-server
spec:
  ports:
  - port: 3306
  selector:
    app: web-serving-db
---
apiVersion: v1
kind: Service
metadata:
  name: memcached-server
spec:
  ports:
  - port: 11211
  selector:
    app: memcached
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  ports:
  - port: 80
  selector:
    app: web-serving-app
{{- end }}
