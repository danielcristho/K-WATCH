# Wazuh deployment values
# Deploy all components on a dedicated node with taint
# References: https://opennix.org/en/docs/wazuh/deployment/wazuh-kubernetes-deployment

namespace: wazuh

nodeSelector:
  node-role.kubernetes.io/siem: ""

tolerations:
  - key: "role"
    operator: "Equal"
    value: "siem"
    effect: "NoSchedule"

# Wazuh Indexer (OpenSearch-based)
indexer:
  replicas: 1
  image: wazuh/wazuh-indexer:4.14.3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 20Gi
    storageClass: local-path
  env:
    OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    discovery.type: "single-node"
    plugins.security.ssl.http.enabled: "true"

# Wazuh Manager
manager:
  replicas: 1
  image: wazuh/wazuh-manager:4.14.3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: local-path
  # Ports exposed
  ports:
    registration: 1515
    communication: 1514
    api: 55000

# Wazuh Dashboard
dashboard:
  replicas: 1
  image: wazuh/wazuh-dashboard:4.14.3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  service:
    type: NodePort
    port: 5601
    nodePort: 30443

# Wazuh Agent -> DaemonSet on workload nodes)
agent:
  enabled: true
  image: wazuh/wazuh-agent:4.14.3
  # Agent runs on workload nodes, NOT on wazuh node
  nodeSelector: {}
  tolerations:
    - operator: Exists
  # Run on all nodes
  affinity: {}

# Credentials
credentials:
  indexerAdmin:
    username: admin
    password: SecretPassword
  apiUser:
    username: wazuh-wui
    password: W4zuh.Admin!2024#Sec # Don't use this in production:)
