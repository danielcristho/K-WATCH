{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wazuh-agent
  namespace: {{ .Values.namespace }}
  labels:
    app: wazuh-agent
spec:
  selector:
    matchLabels:
      app: wazuh-agent
  template:
    metadata:
      labels:
        app: wazuh-agent
    spec:
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: wazuh-agent
          image: {{ .Values.agent.image }}
          env:
            - name: JOIN_MANAGER_IP
              value: "wazuh-manager.{{ .Values.namespace }}.svc.cluster.local"
          command: ["/bin/sh", "-c"]
          args:
            - |
              sed -i "s|CHANGE_MANAGER_IP|${JOIN_MANAGER_IP}|g" /var/ossec/etc/ossec.conf
              sed -i "s|CHANGE_MANAGER_PORT|1514|g" /var/ossec/etc/ossec.conf
              sed -i "s|CHANGE_ENROLL_IP|${JOIN_MANAGER_IP}|g" /var/ossec/etc/ossec.conf
              sed -i "s|CHANGE_ENROLL_PORT|1515|g" /var/ossec/etc/ossec.conf
              sed -i "s|CHANGE_AGENT_NAME|$(cat /etc/hostname 2>/dev/null || echo node-$$)|g" /var/ossec/etc/ossec.conf
              printf '<ossec_config><localfile><log_format>json</log_format><location>/var/log/kwatch/alerts.json</location></localfile></ossec_config>' >> /var/ossec/etc/ossec.conf
              /var/ossec/bin/wazuh-control start
              tail -f /var/ossec/logs/ossec.log
          volumeMounts:
            - name: host-var-log
              mountPath: /var/log
              readOnly: true
            - name: host-run-containerd
              mountPath: /run/containerd
              readOnly: true
          securityContext:
            privileged: true
      volumes:
        - name: host-var-log
          hostPath:
            path: /var/log
        - name: host-run-containerd
          hostPath:
            path: /run/containerd
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
{{- end }}
