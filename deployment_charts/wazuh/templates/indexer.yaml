apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-indexer
  namespace: {{ .Values.namespace }}
  labels:
    app: wazuh-indexer
spec:
  serviceName: wazuh-indexer
  replicas: {{ .Values.indexer.replicas }}
  selector:
    matchLabels:
      app: wazuh-indexer
  template:
    metadata:
      labels:
        app: wazuh-indexer
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: sysctl
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: wazuh-indexer
          image: {{ .Values.indexer.image }}
          resources:
            {{- toYaml .Values.indexer.resources | nindent 12 }}
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: {{ .Values.indexer.env.OPENSEARCH_JAVA_OPTS | quote }}
            - name: discovery.type
              value: {{ index .Values.indexer.env "discovery.type" | quote }}
            - name: plugins.security.ssl.http.enabled
              value: {{ index .Values.indexer.env "plugins.security.ssl.http.enabled" | quote }}
            - name: INDEXER_USERNAME
              value: {{ .Values.credentials.indexerAdmin.username }}
            - name: INDEXER_PASSWORD
              value: {{ .Values.credentials.indexerAdmin.password }}
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          volumeMounts:
            - name: indexer-data
              mountPath: /var/lib/wazuh-indexer
            - name: indexer-certs
              mountPath: /usr/share/wazuh-indexer/certs
              readOnly: true
      volumes:
        - name: indexer-certs
          secret:
            secretName: indexer-certs
  volumeClaimTemplates:
    - metadata:
        name: indexer-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.indexer.persistence.storageClass }}
        storageClassName: {{ .Values.indexer.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.indexer.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-indexer
  namespace: {{ .Values.namespace }}
  labels:
    app: wazuh-indexer
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: 9200
      name: http
  selector:
    app: wazuh-indexer
