# Miner Deployment
{{- if .Values.coinminer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "malicious-containers.fullname" . }}-coinminer
  labels:
    {{- include "malicious-containers.labels" . | nindent 4 }}
    app.kubernetes.io/component: coinminer
    kids-label: "1"
spec:
  replicas: {{ .Values.coinminer.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "malicious-containers.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: coinminer
  template:
    metadata:
      labels:
        {{- include "malicious-containers.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: coinminer
        kids-label: "1"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coinminer
          image: {{ .Values.coinminer.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache openssl
              echo "Starting Trojan Coinminer simulation..."
              while true; do
                echo "[$(date)] Secretly installing mining components..."
                cp /bin/sleep /tmp/.system-update
                chmod +x /tmp/.system-update
                
                echo "[$(date)] Launching mining process in background..."
                /tmp/.system-update 30 &
                
                echo "[$(date)] Resource consumption (high CPU simulation)..."
                dd if=/dev/zero of=/dev/null bs=1M count=200 2>/dev/null &
                openssl speed -multi 2 2>/dev/null &
                
                # Reference: https://www.cryptocompare.com/mining/pools/minexmr/
                echo "[$(date)] Network connection to mining pool..."
                nc -zv -w 1 pool.minexmr.com 4444 2>&1 || true
                nc -zv -w 1 xmr-eu1.nanopool.org 14444 2>&1 || true
                
                wait
                sleep 20
              done
{{- end }}
