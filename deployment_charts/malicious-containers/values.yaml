fullnameOverride: "malicious"

nodeSelector:
  node-role.kubernetes.io/worker: ""

tolerations:
  - key: "role"
    operator: "Equal"
    value: "worker"
    effect: "NoSchedule"

# Binary Label 1: Malicious
mirai:
  enabled: true
  image: alpine:latest
  interval: 5
  commandOverride: true
  label: 1
  replicas: 3

miner:
  enabled: true
  xmrig:
    image: miningcontainers/xmrig
  xmrStak:
    image: timonmat/xmr-stak-cpu
  commandOverride: false
  label: 1

agent:
  enabled: true
  image: alpine:latest
  commandOverride: true
  label: 1
  replicas: 2

coinminer:
  enabled: true
  image: alpine:latest
  commandOverride: true
  label: 1
  replicas: 2

# kinsing:
#   enabled: true
#   image: alpine:latest
#   commandOverride: true
#   label: 1

stratus:
  enabled: true
  image: alpine:latest
  label: 1

bruteforce:
  enabled: true
  image: alpine:latest
  label: 1
