apiVersion: v1
kind: Namespace
metadata:
  name: k-watch
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k-watch-config
  namespace: k-watch
data:
  TETRAGON_LOG: /var/run/cilium/tetragon/tetragon.log
  HUBBLE_LOG: /var/run/cilium/hubble/kwatch-workloads.log
  MODEL_DIR: /models
  ALERT_LOG: /var/log/k-ids/alerts.json
  POLL_INTERVAL: "30"
  NGRAM_SIZE: "5"
  BENIGN_LABELS: "6,7,8,9"
  MONITORED_NAMESPACES: "malicious,benign-workloads,default"
---
apiVersion: v1
kind: Secret
metadata:
  name: k-watch-secrets
  namespace: k-watch
type: Opaque
stringData:
  DISCORD_WEBHOOK: ""
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k-watch-detector
  namespace: k-watch
  labels:
    app: k-watch-detector
spec:
  selector:
    matchLabels:
      app: k-watch-detector
  template:
    metadata:
      labels:
        app: k-watch-detector
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      tolerations:
        - key: role
          operator: Equal
          value: worker
          effect: NoSchedule
      containers:
        - name: detector
          image: danielcristh0/kwatch_detector:1.1
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: k-watch-config
            - secretRef:
                name: k-watch-secrets
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: tetragon-log
              mountPath: /var/run/cilium/tetragon
              readOnly: true
            - name: hubble-log
              mountPath: /var/run/cilium/hubble
              readOnly: true
            - name: alert-log
              mountPath: /var/log/k-ids
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: models
          hostPath:
            path: /opt/k-watch/models
        - name: tetragon-log
          hostPath:
            path: /var/run/cilium/tetragon
        - name: hubble-log
          hostPath:
            path: /var/run/cilium/hubble
        - name: alert-log
          hostPath:
            path: /var/log/k-ids
