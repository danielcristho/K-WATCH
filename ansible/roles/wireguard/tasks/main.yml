---
- name: Install WireGuard
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present
    update_cache: true

- name: Generate WireGuard private key
  ansible.builtin.shell: |
    wg genkey
  register: wg_private_key
  changed_when: true

- name: Derive WireGuard public key
  ansible.builtin.shell: |
    echo "{{ wg_private_key.stdout }}" | wg pubkey
  register: wg_public_key
  changed_when: false

- name: Store WireGuard keys as host facts
  ansible.builtin.set_fact:
    wg_private: "{{ wg_private_key.stdout }}"
    wg_public: "{{ wg_public_key.stdout }}"

- name: Share public keys across hosts
  ansible.builtin.set_fact:
    master_wg_public: "{{ hostvars[groups['master'][0]]['wg_public'] }}"
    worker_wg_public: "{{ hostvars[groups['worker'][0]]['wg_public'] }}"

- name: Create WireGuard config for master
  ansible.builtin.copy:
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
    content: |
      [Interface]
      Address = {{ wg_master_ip }}/24
      PrivateKey = {{ wg_private }}
      ListenPort = 51820

      [Peer]
      PublicKey = {{ worker_wg_public }}
      AllowedIPs = {{ wg_worker_ip }}/32
      Endpoint = {{ groups['worker'][0] }}:51820
      PersistentKeepalive = 25
  when: inventory_hostname in groups['master']

- name: Create WireGuard config for worker
  ansible.builtin.copy:
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
    content: |
      [Interface]
      Address = {{ wg_worker_ip }}/24
      PrivateKey = {{ wg_private }}
      ListenPort = 51820

      [Peer]
      PublicKey = {{ master_wg_public }}
      AllowedIPs = {{ wg_master_ip }}/32
      Endpoint = {{ groups['master'][0] }}:51820
      PersistentKeepalive = 25
  when: inventory_hostname in groups['worker']

- name: Enable and start WireGuard
  ansible.builtin.systemd:
    name: wg-quick@wg0
    enabled: true
    state: started

- name: Wait for WireGuard tunnel to establish
  ansible.builtin.pause:
    seconds: 5

- name: Verify WireGuard connectivity from master to worker
  ansible.builtin.shell: |
    ping -c 3 -W 2 {{ wg_worker_ip }}
  when: inventory_hostname in groups['master']
  changed_when: false
