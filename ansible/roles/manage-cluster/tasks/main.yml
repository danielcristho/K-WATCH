- name: Install kubernetes library for Python (System Package)
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present

- name: Add Cilium Helm repo
  kubernetes.core.k8s_info:
    kind: Namespace
    name: kube-system
    kubeconfig: "{{ kubeconfig_path }}"
  register: k8s_check

- name: Add Cilium chart
  ansible.builtin.shell: |
    helm repo add cilium https://helm.cilium.io/
    helm repo update
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  when: k8s_check.resources is defined

- name: Copy Hubble values to remote
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../deploy/cilium/hubble-values.yaml"
    dest: "/tmp/hubble-values.yaml"
    mode: '0644'

- name: Install Cilium
  ansible.builtin.shell: |
    helm upgrade --install cilium cilium/cilium \
      --namespace kube-system \
      --set operator.replicas=1 \
      --set k3sVars.enabled=true \
      --set k8sServiceHost={{ master_ip }} \
      --set k8sServicePort=6443 \
      --set kubeProxyReplacement=true \
      --set hubble.enabled=true \
      --set hubble.relay.enabled=true \
      --set hubble.ui.enabled=true \
      --set hubble.tls.enabled=false \
      --set hubble.tls.auto.enabled=false \
      --set hubble.relay.tls.server.enabled=false \
      --set hubble.listenAddress="0.0.0.0:4244" \
      --set hubble.maxFlows=16383 \
      -f /tmp/hubble-values.yaml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  when: k8s_check.resources is defined

- name: Label worker nodes
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Node
      metadata:
        name: "{{ hostvars[item]['ansible_hostname'] }}"
        labels:
          node-role.kubernetes.io/worker: "worker"
  loop: "{{ groups['worker'] }}"
  when: k8s_check.resources is defined