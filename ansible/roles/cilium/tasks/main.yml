---
- name: Add Cilium Helm repo
  ansible.builtin.shell: |
    helm repo add cilium https://helm.cilium.io/
    helm repo update
  changed_when: true

- name: Copy Hubble values from local to remote
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../deployment_charts/cilium/hubble-values.yaml"
    dest: /tmp/hubble-values.yaml
    mode: '0644'

- name: Install Cilium
  ansible.builtin.shell: |
    helm upgrade --install cilium cilium/cilium \
      --version 1.16.5 \
      --namespace kube-system \
      --set operator.replicas=1 \
      --set k8sServiceHost={{ hostvars[groups['masters'][0]]['private_ip'] }} \
      --set k8sServicePort=6443 \
      --set kubeProxyReplacement=true \
      --set socketLB.enabled=true \
      --set routingMode=tunnel \
      --set tunnelProtocol=vxlan \
      --set ipam.operator.clusterPoolIPv4PodCIDRList='{10.42.0.0/16}' \
      --set hubble.enabled=true \
      --set hubble.relay.enabled=true \
      --set hubble.ui.enabled=true \
      --set hubble.listenAddress=":4244" \
      -f /tmp/hubble-values.yaml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Copy Hubble Export ConfigMap to remote
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../deployment_charts/cilium/hubble-export-config.yaml"
    dest: /tmp/hubble-export-config.yaml
    mode: '0644'

- name: Apply Hubble Dynamic Export ConfigMap
  ansible.builtin.shell: |
    kubectl apply -f /tmp/hubble-export-config.yaml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for Cilium and Hubble components
  ansible.builtin.shell: |
    kubectl rollout status ds/cilium -n kube-system --timeout=300s
    kubectl rollout status deployment/hubble-relay -n kube-system --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  changed_when: false