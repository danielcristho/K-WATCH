---
- name: Gather facts for all hosts
  hosts: all
  gather_facts: true

- name: Setup Master
  hosts: master
  become: true
  roles:
    - config
    - master
    - manage-cluster
    - tetragon

- name: Setup Worker
  hosts:
    - worker
  become: true
  remote_user: agent007
  roles:
    - config
    - worker