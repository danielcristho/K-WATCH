apiVersion: v1
kind: Namespace
metadata:
  name: honeypot
  labels:
    security: honeypot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-honeypot
  namespace: honeypot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-honeypot
  template:
    metadata:
      labels:
        app: web-honeypot
        role: decoy
    spec:
      containers:
      - name: nginx
        image: nginx:1.21.6
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        ports:
        - containerPort: 80
        volumeMounts:
        - name: secrets-volume
          mountPath: /var/www/html/admin
      volumes:
      - name: secrets-volume
        configMap:
          name: honey-secrets
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: honey-secrets
  namespace: honeypot
data:
  config.php: |
    <?php
    $db_user = "admin";
    $db_pass = "HoneyPotPassword123!";
    ?>
  passwords.txt: |
    root:password
    admin:admin123
