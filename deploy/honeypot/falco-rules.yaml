- rule: Shell in Honeypot
  desc: A shell was spawned in the honeypot container
  condition: container.name = "nginx" and k8s.ns.name = "honeypot" and proc.name in (shell_binaries)
  output: "Honeypot Alert: Shell spawned (user=%user.name container_id=%container.id command=%proc.cmdline)"
  priority: CRITICAL
  tags: [honeypot, mitre_execution]

- rule: Access to Honeypot Secrets
  desc: Sensitive file in honeypot was accessed
  condition: container.name = "nginx" and k8s.ns.name = "honeypot" and fd.name startswith "/var/www/html/admin" and evt.type = open
  output: "Honeypot Alert: Secret file accessed (user=%user.name file=%fd.name command=%proc.cmdline)"
  priority: HIGH
  tags: [honeypot, mitre_credential_access]

- rule: Honeypot Outbound Connection
  desc: Outbound connection from honeypot container
  condition: container.name = "nginx" and k8s.ns.name = "honeypot" and outbound and not k8s.dns_interaction
  output: "Honeypot Alert: Outbound connection (user=%user.name remote_ip=%fd.rip command=%proc.cmdline)"
  priority: WARNING
  tags: [honeypot, mitre_command_and_control]
