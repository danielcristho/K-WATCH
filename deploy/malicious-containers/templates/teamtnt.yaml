{{- if .Values.teamtnt.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "malicious-containers.fullname" . }}-teamtnt
  labels:
    {{- include "malicious-containers.labels" . | nindent 4 }}
    app.kubernetes.io/component: teamtnt
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "malicious-containers.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: teamtnt
  template:
    metadata:
      labels:
        {{- include "malicious-containers.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: teamtnt
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: teamtnt
          image: {{ .Values.teamtnt.image }}
          {{- if .Values.teamtnt.commandOverride }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting TeamTNT simulation..."
              # TeamTNT often uses tmate for persistence
              echo "[$(date)] Searching for credentials and secrets..."
              find / -name ".aws" 2>/dev/null
              find / -name ".ssh" 2>/dev/null
              
              while true; do
                echo "[$(date)] Checking for Docker socket..."
                if [ -S /var/run/docker.sock ]; then
                  echo "[$(date)] Found Docker socket! Attempting breakout..."
                fi
                
                echo "[$(date)] Accessing Cloud Metadata..."
                curl -s -m 2 http://169.254.169.254/latest/meta-data/ 2>/dev/null || true
                
                echo "[$(date)] Installing persistence (simulated cron)..."
                echo "* * * * * /tmp/update.sh" >> /etc/crontab 2>/dev/null || echo "Failed to write to crontab (expected)"
                
                echo "[$(date)] Running xmrig (simulated)..."
                cp /bin/sleep /tmp/xmrig
                chmod +x /tmp/xmrig
                /tmp/xmrig 45 &
                
                sleep 60
              done
          {{- end }}
          volumeMounts:
            {{- if .Values.teamtnt.simulateHostMount }}
            - name: docker-socket
              mountPath: /var/run/docker.sock
            {{- end }}
      volumes:
        {{- if .Values.teamtnt.simulateHostMount }}
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
        {{- end }}
{{- end }}
